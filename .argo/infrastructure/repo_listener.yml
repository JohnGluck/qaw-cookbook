apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playwright-tests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JohnGluck/qaw-cookbook.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
