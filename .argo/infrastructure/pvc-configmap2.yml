apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-argo-workflows-workflow-controller-configmap
  namespace: argo
data:
  config: |
    nodeEvents:
      enabled: true
    workflowEvents:
      enabled: true
    artifactRepository:
      config:
        archiveLogs: true
        mountPath: /mnt/playwright-reports
        claimName: playwright-reports-pvc
