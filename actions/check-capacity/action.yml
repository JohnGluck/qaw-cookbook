jobs:
  check-capacity:
    name: Check Available Runners
    runs-on: ubuntu-latest
    outputs:
      available_runners:
    steps:
      - name: Get Available Runners
        id: get-runners
        run: |
          MAX_RUNNERS=40  # Or however many your org allows
          CURRENT_RUNNING=$(gh run list --limit $MAX_RUNNERS --json status --repo "$GITHUB_REPOSITORY" | jq '[.[] | select(.status == "in_progress")] | length')
          AVAILABLE=$((MAX_RUNNERS - CURRENT_RUNNING))
          FINAL_COUNT=$((AVAILABLE > 1 ? AVAILABLE : 1))  # Fallback to at least 1 runner
          echo "count=$FINAL_COUNT" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
