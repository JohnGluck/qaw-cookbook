name: Adaptive Playwright Tests
on:
  push:
    branches:
      - main

concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: false  # Ensures in-progress jobs complete instead of being canceled

jobs:
  check-capacity:
    name: Check Available Runners
    runs-on: ubuntu-latest
    outputs:
      available_runners: ${{ steps.get-runners.outputs.count }}
    steps:
      - name: Get Current Running Jobs
        id: get-runners
        run: |
          MAX_RUNNERS=40  # Max allowed in the org
          CURRENT_RUNNING=$(gh run list --limit $MAX_RUNNERS --json status --repo $GITHUB_REPOSITORY | jq '[.[] | select(.status == "in_progress")] | length')
          AVAILABLE=$((MAX_RUNNERS - CURRENT_RUNNING))
          FINAL_COUNT=$((AVAILABLE > 5 ? 5 : AVAILABLE))  # Ensure at least 5 runners available
          echo "Available runners: $FINAL_COUNT"
          echo "count=$FINAL_COUNT" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  controller:
    name: Generate Test Shards
    runs-on: ubuntu-latest
    needs: check-capacity
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Split tests evenly across runners
        run: |
          mkdir -p test-splits
          TEST_FILES=$(find tests -name "*.spec.ts" | sort)
          TOTAL_RUNNERS=${{ needs.check-capacity.outputs.available_runners }}
          SPLIT_COUNT=$(( $(echo "$TEST_FILES" | wc -l) / TOTAL_RUNNERS + 1 ))

          echo "$TEST_FILES" | split -l $SPLIT_COUNT - test-splits/shard_

      - name: Upload test splits
        uses: actions/upload-artifact@v4
        with:
          name: test-assignments
          path: test-splits/

      - name: Generate matrix from test splits
        id: set-matrix
        run: |
          MATRIX=$(ls tests | jq -R -s -c 'split("\n")[:-1] | map({shard: .})')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    name: Run Playwright tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    container:
        image: mcr.microsoft.com/playwright:v1.51.1-jammy
    env:
        HOME: /root
    needs: controller
    strategy:
      matrix: ${{ fromJson(needs.controller.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Download test assignments
        uses: actions/download-artifact@v4
        with:
          name: test-assignments

      - name: Read assigned tests
        id: load-tests
        run: |
          TESTS=$(cat test-splits/${{ matrix.shard }})
          echo "TESTS=$TESTS" >> $GITHUB_ENV

      - name: Run assigned tests
        run: npx playwright test $TESTS

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 1
