name: Adaptive Playwright Tests
on:
  workflow_dispatch:




concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: false  # Ensures in-progress jobs complete instead of being canceled

jobs:
  check-capacity:
    name: Check Available Runners
    runs-on: ubuntu-latest
    outputs:
      available_runners: ${{ steps.get-runners.outputs.count }}
    steps:
      - name: Get Current Running Jobs
        id: get-runners
        run: |
          MAX_RUNNERS=40  # Max allowed in the org
          CURRENT_RUNNING=$(gh run list --limit $MAX_RUNNERS --json status --repo $GITHUB_REPOSITORY | jq '[.[] | select(.status == "in_progress")] | length')
          AVAILABLE=$((MAX_RUNNERS - CURRENT_RUNNING))
          FINAL_COUNT=$((AVAILABLE > 5 ? AVAILABLE : 5))  # Ensure at least 5 runners available
          echo "Available runners: $FINAL_COUNT"
          echo "count=$FINAL_COUNT" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  controller:
    name: Generate Test Shards
    runs-on: ubuntu-latest
    needs: check-capacity
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Split tests evenly across runners
        run: |
          mkdir -p test-splits
          find tests -name "*.spec.ts" | sort > all-tests.txt
          if [[ ! -s all-tests.txt ]]; then
            echo "❌ No test files found."
            exit 1
          fi
          TOTAL_RUNNERS=${{ needs.check-capacity.outputs.available_runners }}
          if [[ -z "$TOTAL_RUNNERS" || "$TOTAL_RUNNERS" -le 0 ]]; then
            echo "❌ Invalid runner count: $TOTAL_RUNNERS"
            exit 1
          fi
          TOTAL_TESTS=$(wc -l < all-tests.txt)
          SPLIT_COUNT=$(( TOTAL_TESTS / TOTAL_RUNNERS + 1 ))
          split -l $SPLIT_COUNT all-tests.txt test-splits/shard_
          echo "✅ Created shards:"
          ls -1 test-splits
      - name: Upload test splits
        uses: actions/upload-artifact@v4
        with:
          name: test-assignments
          path: test-splits/

      - name: Show test shards
        run: |
          echo "Generated shards:"
          ls -l test-splits

      - name: Generate combined shard-browser matrix
        id: set-matrix
        run: |
          shards=$(ls test-splits | jq -R -s -c 'split("\n")[:-1]')
          browsers='["chromium", "firefox", "webkit"]'
          MATRIX=$(jq -n --argjson s "$shards" --argjson b "$browsers" '[ $s[] as $shard | $b[] as $browser | { shard: $shard, browser: $browser } ]' | jq -c)
          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT


  test:
    name: Run Playwright tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    container:
        image: mcr.microsoft.com/playwright:v1.51.1-jammy
    env:
        HOME: /root
    needs: controller
    strategy:
      matrix: ${{ fromJson(needs.controller.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Download test assignments
        uses: actions/download-artifact@v4
        with:
          name: test-assignments
          path: test-splits

      - name: Read assigned tests
        id: load-tests
        run: |
          TESTS=$(cat test-splits/${{ matrix.shard }})
          echo "TESTS=$TESTS" >> $GITHUB_ENV
      - name: Run assigned tests
        run: npx playwright test $TESTS

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 1
