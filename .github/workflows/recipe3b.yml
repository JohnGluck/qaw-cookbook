name: Adaptive Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  controller:
    runs-on: ubuntu-latest
    outputs:
      shard_list: ${{ steps.set-shards.outputs.shard_list }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Split tests and generate shard list
        id: set-shards
        run: |
          mkdir -p test-splits
          find tests -name "*.spec.ts" | sort > all-tests.txt
          TOTAL_TESTS=$(wc -l < all-tests.txt)
          TOTAL_RUNNERS=4  # Replace or compute dynamically
          SPLIT_COUNT=$(( TOTAL_TESTS / TOTAL_RUNNERS + 1 ))

          split -l $SPLIT_COUNT all-tests.txt test-splits/shard_

          shards=$(ls test-splits | sort)
          shard_array=""
          for shard in $shards; do
            shard_array+="\"$shard\","
          done

          shard_list="[${shard_array%,}]"
          echo "🧪 Shards: $shard_list"
          echo "shard_list=$shard_list" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: test-splits
          path: test-splits/

  test:
    name: Run ${{ matrix.shard }} on ${{ matrix.browser }}
    needs: controller
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: ${{ fromJson(needs.controller.outputs.shard_list) }}
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright & dependencies
        run: npx playwright install --with-deps

      - name: Download test shard
        uses: actions/download-artifact@v4
        with:
          name: test-splits
          path: test-splits

      - name: Set TESTS env var
        run: |
          TESTS=$(cat test-splits/${{ matrix.shard }})
          echo "TESTS=$TESTS" >> $GITHUB_ENV

      - name: Run Playwright tests
        run: |
          echo "▶️ Running ${{ matrix.shard }} on ${{ matrix.browser }}"
          BROWSER=${{ matrix.browser }}
          SHARD=${{ matrix.shard }}
          npx playwright test $TESTS \
            --project=$BROWSER \
            --config=playwright.config.recipe3.ts

      - name: Copy JSON report
        if: always()
        run: |
          mkdir -p merged-results
          cp test-results/report.json merged-results/${{ matrix.browser }}-${{ matrix.shard }}.json

            - name: Upload report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: results-blob-${{ matrix.browser }}-${{ matrix.shard }}
                path: results-blob/
                if-no-files-found: ignore

  merge-reports:
    name: Merge Playwright Reports
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: merged-results
          path: merged-results

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html merged-results

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: merged-playwright-report
          path: playwright-report/
