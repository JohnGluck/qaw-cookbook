name: Adaptive Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      HOME: /root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Calculate available runners and split tests
        id: split
        run: |
          MAX_RUNNERS=40
          CURRENT_RUNNING=$(gh run list --limit $MAX_RUNNERS --json status --repo $GITHUB_REPOSITORY | jq '[.[] | select(.status == "in_progress")] | length')
          AVAILABLE=$((MAX_RUNNERS - CURRENT_RUNNING))
          FINAL_COUNT=$((AVAILABLE > 5 ? AVAILABLE : 5))
          echo "🧮 Available runners: $FINAL_COUNT"

          mkdir -p test-splits
          find tests -name "*.spec.ts" | sort > all-tests.txt
          TOTAL_TESTS=$(wc -l < all-tests.txt)
          SPLIT_COUNT=$(( TOTAL_TESTS / FINAL_COUNT + 1 ))

          split -l $SPLIT_COUNT all-tests.txt test-splits/shard_
          echo "✅ Shards created:"
          ls test-splits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run each shard on each browser
        run: |
          for shard in test-splits/*; do
            for browser in chromium firefox webkit; do
              echo "🧪 Running $shard on $browser"
              TESTS=$(cat "$shard")
              npx playwright test $TESTS --project=$browser --config=playwright.config.recipe2.ts
            done
          done

  merge-reports:
    name: Merge Playwright Reports
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          pattern: results-json-*
          path: merged-results
          merge-multiple: true

      - name: Merge Playwright reports
        run: |
          npx playwright merge-reports --reporter html ./merged-results

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: merged-playwright-report
          path: playwright-report/
