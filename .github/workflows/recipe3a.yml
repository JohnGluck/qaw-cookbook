# .github/workflows/adaptive-playwright.yml
name: Adaptive Playwright Tests
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  check-capacity:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.set.outputs.count }}
    steps:
      - id: set
        run: |
          max=40
          current=$(gh run list --json status --limit $max --repo $GITHUB_REPOSITORY | jq '[.[] | select(.status=="in_progress")] | length')
          count=$((max - current))
          count=$((count > 5 ? count : 5))
          echo "count=$count" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shard:
    runs-on: ubuntu-latest
    needs: check-capacity
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir test-splits
          find tests -name '*.spec.ts' | sort > all.txt
          count=${{ needs.check-capacity.outputs.count }}
          total=$(wc -l < all.txt)
          per=$((total/count + 1))
          split -l $per all.txt test-splits/shard_
      - id: set
        run: |
          shards=$(ls test-splits | jq -R -s -c 'split("\n")[:-1]')
          matrix=$(jq -n --argjson s "$shards" --argjson b '["chromium","firefox","webkit"]' '[ $s[] as $shard | $b[] as $browser | {shard:$shard, browser:$browser} ]')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: test-splits
          path: test-splits/

  test:
    needs: shard
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.shard.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: test-splits
          path: test-splits
      - run: |
          TESTS=$(cat test-splits/${{ matrix.shard }})
          echo "TESTS=$TESTS" >> $GITHUB_ENV
      - run: npx playwright test $TESTS --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.browser }}-${{ matrix.shard }}
          path: test-results

  report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true
          path: merged
      - run: npx playwright merge-reports --reporter html merged
      - uses: actions/upload-artifact@v4
        with:
          name: merged-report
          path: playwright-report
