name: Adaptive Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "tests-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-v1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright & deps
        run: npx playwright install --with-deps

      - name: Calculate available runners and split tests
        id: split
        run: |
          MAX_RUNNERS=40
          CURRENT_RUNNING=$(gh run list --limit $MAX_RUNNERS --json status --repo $GITHUB_REPOSITORY | jq '[.[] | select(.status == "in_progress")] | length')
          AVAILABLE=$((MAX_RUNNERS - CURRENT_RUNNING))
          FINAL_COUNT=$((AVAILABLE > 5 ? AVAILABLE : 5))
          echo "🧮 Available runners: $FINAL_COUNT"

          mkdir -p test-splits
          find tests -name "*.spec.ts" | sort > all-tests.txt
          TOTAL_TESTS=$(wc -l < all-tests.txt)
          SPLIT_COUNT=$(( TOTAL_TESTS / FINAL_COUNT + 1 ))

          split -l $SPLIT_COUNT all-tests.txt test-splits/shard_
          echo "✅ Shards created:"
          ls test-splits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run each shard on each browser
        run: |
          mkdir -p results-json

          for shard in test-splits/*; do
            SHARD_NAME=$(basename "$shard")
            for browser in chromium firefox webkit; do
              echo "🧪 Running $shard on $browser"
              TESTS=$(cat "$shard")

              export BROWSER="$browser"
              export SHARD="$SHARD_NAME"

              npx playwright test $TESTS --project=$browser --config=playwright.config.recipe3.ts
              echo 'ls test results'
              ls test-results
              wc | ls test-results

              RESULT_FILE="test-results/results-${BROWSER}-${SHARD}.json"
              if [[ -f "$RESULT_FILE" ]]; then
                mkdir -p results-json/${browser}-${SHARD}
                cp "$RESULT_FILE" results-json/${browser}-${SHARD}/report.json
              else
                echo "⚠️ No test result file found: $RESULT_FILE"
              fi

            done
          done

      - name: Upload all JSON test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-json
          path: results-json/

      - name: Debug test-results directory
        run: ls -R results-json

  merge-reports:
    name: Merge Playwright Reports
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Download JSON reports
        uses: actions/download-artifact@v4
        with:
          name: results-json
          path: merged-results

      - name: Merge Playwright reports
        run: |
          echo "📂 Listing contents of merged-results:"
          ls -lRh "${{ github.workspace }}/merged-results"

          echo "📦 Merging reports..."
          npx playwright merge-reports --reporter html "${{ github.workspace }}/merged-results"

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: merged-playwright-report
          path: playwright-report/
