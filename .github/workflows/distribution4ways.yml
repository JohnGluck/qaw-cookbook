name: Playwright Tests (Dynamic Distribution)
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  generate-matrix:
    name: Generate Test Distribution
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Choose Test Distribution Strategy
        id: set-matrix
        uses: ./actions/distribution/round-robin  # Change this line to switch strategies
  test-runner:
    name: Run Playwright Tests
    needs: generate-matrix
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run Playwright Tests
        run: npx playwright test ${{ matrix.testFile }}
